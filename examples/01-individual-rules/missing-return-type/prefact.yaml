package_name: mypackage

include:
  - "**/*.py"

exclude:
  - "**/__pycache__/**"

rules:
  relative-imports:
    enabled: false
  unused-imports:
    enabled: false
  duplicate-imports:
    enabled: false
  wildcard-imports:
    enabled: false
  sorted-imports:
    enabled: false
  string-concat:
    enabled: false
  print-statements:
    enabled: false
  missing-return-type:
    enabled: true
